<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Buddy Pro | Royal Edition</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="luxury-wrapper">
        <nav class="top-nav">
            <div class="logo">STUDY<span>BUDDY</span></div>
            <div class="nav-links">
                <a href="#about">What is it?</a>
                <a href="#app" class="gold-link">Neural Engine</a>
            </div>
        </nav>

        <section id="hero" class="royal-hero">
            <h1>Mastery Through <span class="gold-text">AI Intelligence</span></h1>
            <p>The elite choice for academic excellence.</p>
        </section>

        <section id="app" class="neural-engine">
            <div class="glass-panel">
                <h2>Royal Processor</h2>
                <p class="panel-subtitle">Paste your material for instant refined summary</p>
                <textarea id="userInput" placeholder="Paste your academic text here..."></textarea>
                <button class="royal-btn" onclick="royalProcess()">Process with AI ⟡</button>

                <div id="loader" class="hidden">
                    <div class="spinner-gold"></div>
                    <p>Consulting Neural Network...</p>
                </div>

                <div id="resultContainer" class="hidden">
                    <div class="gold-divider"></div>
                    <h3>Executive Summary</h3>
                    <div id="summaryText"></div>
                </div>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
