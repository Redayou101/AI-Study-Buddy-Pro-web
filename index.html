<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyAI | Redha Younes Edition Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="stars"></div>
    
    <nav class="navbar">
        <div class="logo">STUDY<span>AI</span></div>
        <div class="dev-credit">Lead Developer: Redha Younes Al Sayed Hasan</div>
    </nav>

    <main class="container">
        <header class="hero">
            <h1>Elite <span class="gold">Neural</span> Assistant</h1>
            <p>Empowering academic excellence through Redha's logic engine.</p>
        </header>

        <section class="glass-card">
            <div class="status-bar">● System Status: <span class="gold">Operational</span></div>
            
            <div class="function-tabs">
                <button class="tab-btn active" id="btn-summarize" onclick="setMode('summarize')">Summarize</button>
                <button class="tab-btn" id="btn-quiz" onclick="setMode('quiz')">Generate Quiz</button>
                <button class="tab-btn" id="btn-simplify" onclick="setMode('simplify')">Simplify (ELI5)</button>
            </div>

            <textarea id="userInput" placeholder="Paste your study material here for analysis..."></textarea>
            
            <button id="actionBtn" onclick="runAnalysis()">INITIATE NEURAL SCAN</button>

            <div id="resultContainer" class="result-box hidden">
                <div class="result-header">
                    <h3 id="resultTitle">✦ EXECUTIVE SUMMARY</h3>
                </div>
                <p id="aiText"></p>
                <div class="result-footer">
                    <button class="copy-btn" onclick="copyResult()">Copy Insights</button>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        Developed with Excellence by <span class="gold">Redha Younes Al Sayed Hasan</span> © 2026
    </footer>

    <script src="script.js"></script>
</body>
</html>
